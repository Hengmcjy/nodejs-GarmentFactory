<p-toast position="top-right" key="showConfirmToUserNodeLogin"  [baseZIndex]="5000" >
    <ng-template let-message pTemplate="message">
        <div class="flex flex-column" style="flex: 1">
            <div class="text-center">
                <i class="pi pi-exclamation-triangle" style="font-size: 3rem"></i>
                <h4>{{message.summary}}</h4>
                <p>{{message.detail}}</p>
            </div>
            <div class="grid p-fluid mt-2">
                <div class="col-6">
                    <!-- <button type="button" pButton  label="Yes" class="p-button-success" (click)="closeMsg()"></button> -->
                </div>
                <div class="col-6">
                    <button type="button" pButton  label="go to" class="p-button-secondary" (click)="showAllowUserNodeLoginModal()"></button>
                </div>
            </div>
        </div>
    </ng-template>
</p-toast>


<div class="layout-wrapper" [ngClass]="containerClass">
    <app-topbar></app-topbar>
    <div class="layout-sidebar ">
        <app-sidebar></app-sidebar>

    </div>
    <div class="layout-main-container">
        <div class="">
            <router-outlet></router-outlet>
        </div>
        <app-footer></app-footer>
    </div>
    <app-config *ngIf="userService.iconConfigShow"></app-config>
    <div class="layout-mask"></div>
</div>
