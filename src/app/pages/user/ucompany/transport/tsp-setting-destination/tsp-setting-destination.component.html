
<app-ucompany-menu></app-ucompany-menu>

<div class="surface-ground px-2 py-2 md:px-2 lg:px-2">
    <div class="p-fluid flex flex-column lg:flex-row">
        <ul class="list-none m-0 p-0 flex flex-row lg:flex-column justify-content-evenly md:justify-content-between lg:justify-content-start mb-5 lg:pr-8 lg:mb-0">
            <li>
                <span class="order-id">
                    <!-- {{order.orderID}} -->
                </span>
            </li>

            <li>
                <a pripple=""
                    class="p-ripple p-element flex align-items-center cursor-pointer p-3 border-round text-800 hover:surface-hover transition-duration-150 transition-colors"
                    (click)="changeMode('destination-list');">
                    <i class="pi pi-list md:mr-2"></i>
                    <span class="font-medium hidden md:block">destination list</span>
                    <span class="p-ink" style="height: 149px;width: 149px;top: -59.9445px;left: 14.0555px;"></span>
                </a>
            </li>

            <li>
                <a pripple=""
                    class="p-ripple p-element flex align-items-center cursor-pointer p-3 border-round text-800 hover:surface-hover transition-duration-150 transition-colors"
                    (click)="changeMode('destination-create');">
                    <i class="pi pi-plus-circle md:mr-2"></i>
                    <span class="font-medium hidden md:block">destination create</span>
                    <span class="p-ink" style="height: 149px;width: 149px;top: -59.9445px;left: 14.0555px;"></span>
                </a>
            </li>

            <!-- <li>
                <a pripple=""
                    class="p-ripple p-element flex align-items-center cursor-pointer p-3 border-round text-800 hover:surface-hover transition-duration-150 transition-colors"
                    (click)="changeMode('destination-edit');">
                    <i
                        class="pi pi-list md:mr-2"></i>
                        <span class="font-medium hidden md:block">destination edit</span>
                        <span class="p-ink" style="height: 149px;width: 149px;top: -59.9445px;left: 14.0555px;"></span>
                </a>
            </li> -->


        </ul>

        <div class="surface-ground flex-auto py-2  w-11" *ngIf="mode==='destination-list'">

            <div class="grid">
                <div class="col-6">
                    <p-table [value]="dCountries" styleClass="p-datatable-striped p-datatable-sm" >
                        <ng-template pTemplate="header">
                            <tr class="text-center">
                                <th style="width: 20%">###</th>
                                <th style="width: 35%">Destination Country</th>
                                <th style="width: 35%">Destination Info</th>
                                <th style="width: 10%" ></th>

                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-c>
                            <tr>
                                <td class="text-xs text-300">{{c.seq}}</td>
                                <td>{{c.dCountryID}}</td>
                                <td>{{c.dCountryName}}</td>
                                <td>
                                    <p-button icon="pi pi-pencil"
                                        styleClass="p-button-sm p-button-rounded p-button-warning p-button-text"
                                        (onClick)="destinationEdit();dCountryCartonSelect(c);"></p-button>
                                    <!-- <p-button icon="pi pi-times" styleClass="p-button-sm p-button-rounded p-button-danger p-button-text"></p-button> -->
                                </td>

                            </tr>
                        </ng-template>
                    </p-table>
                </div>
                <div class="col-6" *ngIf="editMode">
                    <!--  -->
                    <div class="surface-card p-4 shadow-2 border-round p-fluid">
                        <div class="grid formgrid p-fluid">
                            <div class="field mb-4 col-12">
                                <label for="company_name" class="font-medium text-900">
                                    ### :
                                </label>
                                <input type="text" pInputText  class="w-full"
                                    (keypress)="userService.numberOnly($event);"
                                    onClick="this.select();"
                                    [(ngModel)]="dCountry.seq">
                            </div>

                            <div class="field mb-4 col-12">
                                <label for="company_name" class="font-medium text-900">
                                    Destination Country :
                                </label>
                                <input type="text" pInputText  class="w-full"
                                    onClick="this.select();"
                                    [(ngModel)]="dCountry.dCountryID">
                            </div>

                            <div class="field mb-4 col-12">
                                <label for="company_name" class="font-medium text-900">
                                    Destination Info :
                                </label>
                                <input type="text" pInputText  class="w-full"
                                    onClick="this.select();"
                                    [(ngModel)]="dCountry.dCountryName">
                            </div>
                        </div>
                        <button pbutton="" pripple="" label="Edit Destination" icon="pi pi-file"
                            class="p-element p-ripple w-auto p-button p-component">
                            <span class="p-button-icon p-button-icon-left pi pi-save"
                                aria-hidden="true">
                            </span>
                            <span class="p-button-label">Edit Destination</span>
                            <span class="p-ink"></span>
                        </button>
                        <p-button icon="pi pi-times"
                            styleClass="p-button-rounded p-button-warning p-button-text"
                            (onClick)="destinationEdit()">

                        </p-button>
                    </div>
                    <!--  -->
                </div>
            </div>
        </div>
        <div class="surface-ground flex-auto py-2  w-11" *ngIf="mode==='destination-create'">

            <div class="grid">
                <div class="col-6">
                    <!--  -->
                    <div class="surface-card p-4 shadow-2 border-round p-fluid">
                        <div class="grid formgrid p-fluid">
                            <div class="field mb-4 col-12">
                                <label for="company_name" class="font-medium text-900">
                                    ### :
                                </label>
                                <input id="company_name" type="text" pinputtext=""
                                    class="p-inputtext p-component p-element">
                            </div>

                            <div class="field mb-4 col-12">
                                <label for="company_name" class="font-medium text-900">
                                    Destination Country :
                                </label>
                                <input id="company_name" type="text" pinputtext=""
                                    class="p-inputtext p-component p-element">
                            </div>

                            <div class="field mb-4 col-12">
                                <label for="company_name" class="font-medium text-900">
                                    Destination Info :
                                </label>
                                <input id="company_name" type="text" pinputtext=""
                                    class="p-inputtext p-component p-element">
                            </div>
                        </div>
                        <button pbutton="" pripple="" label="Create Destination" icon="pi pi-file"
                            class="p-element p-ripple w-auto p-button p-component">
                            <span class="p-button-icon p-button-icon-left pi pi-save"
                                aria-hidden="true">
                            </span>
                            <span class="p-button-label">Create Destination</span>
                            <span class="p-ink"></span>
                        </button>
                    </div>
                    <!--  -->
                </div>
                <div class="col-6">

                </div>
            </div>
        </div>
        <!-- <div class="surface-ground flex-auto py-2  w-11" *ngIf="mode==='destination-edit'">
            destination-edit
        </div> -->

    </div>
</div>
