
<app-ucompany-menu></app-ucompany-menu>

<div class="container">
    <div class="topright z-index1000">
        <span class="">
            {{yarnService.getyarnMainMode(viewMode)}}
        </span>
    </div>
</div>

<div class="grid">
    <div class="col-12 md:col-3 lg:col-2 m-0 pr-0">
        <div class="sticky-top150">

            <div class="w-full pt-2 px-2 cursor-pointer sticky-top" (click)="showFactorySelectionModal()">
                <app-spns-yarn-factory [factorySelect]="factorySelect"></app-spns-yarn-factory>
            </div>
            <div class="w-full pt-2 px-2 cursor-pointer" (click)="showYarnSeasonsList()">
                <app-spns-yarn-seasonyear [yarnSeason]="yarnSeason"></app-spns-yarn-seasonyear>
            </div>
            <div class="w-full pt-2 px-2 cursor-pointer" (click)="showCustomerSelectionModal()">
                <app-spns-yarn-customer [customer]="customer"></app-spns-yarn-customer>
            </div>

            <div class="w-full py-2 px-2">
                &nbsp;
            </div>

            <div class="w-full pt-2 px-2 cursor-pointer" *ngIf="viewMode==='plan'"
                (click)="checkMode('list')">
                <div class="card01 bg-teal-50 w-full p-2 mb-2 text-center">
                    <div class="txt-green-600">
                        <i class="pi pi-refresh"></i>
                        &nbsp;
                        Yarn list
                    </div>
                </div>
            </div>

            <div class="w-full pt-2 px-2 cursor-pointer" *ngIf="viewMode==='factoryStock'"
                (click)="goFactoryYarnLot()">
                <div class="card01 bg-orange-100 w-full p-2 mb-2 text-center">
                    <div class="text-orange-600">
                        <span class="material-symbols-outlined">warehouse</span>
                        &nbsp;
                        Factory yarn lot
                    </div>
                </div>
            </div>

            <div class="w-full pt-2 px-2 cursor-pointer" *ngIf="mode==='list' && viewMode==='plan'"
                (click)="mode='create'">
                <div class="card01 bg-teal-50 w-full p-2 mb-2 text-center">
                    <div class="txt-green-600">
                        + New plan
                    </div>
                </div>
            </div>

        </div>
    </div>
    <div class="col-12 md:col-9 lg:col-10 m-0 pl-0">
        <div class="pt-2 pl-4">
            <div *ngIf="mode==='' && viewMode==='plan'">
                <img src="https://storage.googleapis.com/mystoragegarment/yarnStock.jpg" class="mb-3 w-full" />
            </div>

            <div class="text-center" *ngIf="mode !=='' && viewMode ==='plan' && loading">
                <p-progressSpinner styleClass="w-4rem h-4rem" strokeWidth="8" fill="var(--surface-ground)" animationDuration=".5s"></p-progressSpinner>
            </div>


            <div class="" *ngIf="viewMode==='plan'">
                <app-s-yarn-plan-list-manage *ngIf="(mode==='list-manage-plan' || mode==='list-manage-actual') && !loading"
                    [mode]="mode"
                    [yarnSeason]="yarnSeason"
                    [company]="company"
                    [factorySelect]="factorySelect"
                    [customer]="customer"
                    [yarnPlan]="yarnPlan">
                </app-s-yarn-plan-list-manage>

                <app-s-yarn-plan-list *ngIf="mode==='list' && !loading"
                    [mode]="mode"
                    [yarnSeason]="yarnSeason"
                    [company]="company"
                    [factorySelect]="factorySelect"
                    [customer]="customer"
                    [yarnPlans]="yarnPlans"
                    [yarnPlansCount]="yarnPlansCount"
                    [yarns]="yarns"
                    [yarnsCount]="yarnsCount"
                    (selectYarnPlan)="gotoYarnManage($event)">
                </app-s-yarn-plan-list>

                <app-smd-yarn-plan-manage *ngIf="mode==='create'"
                    [mode]="mode"
                    [yarnSeason]="yarnSeason"
                    [company]="company"
                    [factorySelect]="factorySelect"
                    [customer]="customer"
                    (selectEvent)="createNewPlanEvent($event)">
                </app-smd-yarn-plan-manage>
            </div>



            <div class="" *ngIf="viewMode==='factoryStock'">
                <app-s-yarn-lot-fac *ngIf="mode==='fac-lot'"
                    [mode]="mode"
                    [viewMode]="'yarn-lot-fac'"
                    [yarnSeasonID]="yarnSeason"
                    [company]="company"
                    [factorySelect]="factorySelect"
                    [customer]="customer"
                    [yarnPlans]="yarnPlans"
                    [yarnPlansCount]="yarnPlansCount"
                    [yarns]="yarns"
                    [yarnsCount]="yarnsCount"
                    (closeYarnStockCard)="gotoMode($event)">
                </app-s-yarn-lot-fac>
            </div>

            <!-- <div class="" *ngIf="viewMode==='yarnTransferReport'">
                <app-s-yarn-transfer-report
                    [mode]="mode"
                    [viewMode]="viewMode"
                    [yarnSeasonID]="yarnSeason"
                    [company]="company"
                    [factorySelect]="factorySelect"
                    [customer]="customer"
                    [yarnPlans]="yarnPlans"
                    [yarnPlansCount]="yarnPlansCount"
                    [yarns]="yarns"
                    [yarnsCount]="yarnsCount"
                    (closeYarnTransferCard)="gotoMode($event)">

                </app-s-yarn-transfer-report>
            </div> -->




        </div>

    </div>
</div>
