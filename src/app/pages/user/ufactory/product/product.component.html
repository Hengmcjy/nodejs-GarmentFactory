<!-- <app-ufactory-dashboard-menu></app-ufactory-dashboard-menu>  -->
<app-ucompany-menu></app-ucompany-menu>

<div class="surface-section ">
    <p-paginator [rows]="limit" [totalRecords]="productsCount" [rowsPerPageOptions]="[10,20,50]"
                (onPageChange)="paginate($event)"></p-paginator>

    <div class="flex flex-wrap lg:flex-nowrap p-0 m-0">
        <div class="w-full surface-ground m-0 p-0 b-0  mt-3 lg:mt-0"
            style="min-height: 25rem;">
            <div class="surface-ground px-4 py-2 md:px-4 lg:px-4">
                <div class="grid -mt-3 -ml-3 -mr-3">
                    <div class="col-12 sm:col-4 md:col-3 lg:col-2">
                        <!-- create product -->
                            <div class="shadow-2 p-2 m-2 border-round bg-yellow-100">
                                <div class="relative mb-3">
                                    <img src="https://storage.googleapis.com/mystoragegarment/createnewproduct.png" class="w-full">
                                </div>
                                <ul class="list-none m-0 p-0">
                                    <li class="px-0 py-2 flex justify-content-between align-items-center">
                                        <span class="text-600 font-medium text-sm"></span>
                                        <span class="text-900 font-medium text-sm">
                                            <p-toast [style]="{marginTop: '80px'}"></p-toast>
                                            <button pButton type="button" label="new product" icon="pi pi-plus" class="p-button-text w-full"
                                                (click)="showCreateProductModal()">
                                            </button>
                                        </span>
                                    </li>
                                </ul>
                            </div>

                    </div>

                    <div class="col-12 sm:col-4 md:col-3 lg:col-2 " *ngFor="let product1 of products; let i = index">
                        <div class="shadow-2 p-2 m-2 surface-card border-round">
                            <div class="relative mb-3 ">

                                <img [src]="genImagePath(product1.imageProfile)" class="p-2 w-full">
                            </div>
                            <div class="flex justify-content-between align-items-center mb-3">
                                <span class="text-900 font-medium text-xl">
                                    {{product1?.productName}}
                                </span>
                            </div>
                            <p class="mt-0 mb-3 text-600 line-height-3">
                                {{product1?.productDetail}}
                            </p>
                            <div class="px-0 py-0 mt-2 text-right">
                                <button pbutton="" pripple="" icon="pi pi-arrow-right" iconpos="right"
                                    class="p-element p-ripple p-button-rounded p-button-text p-button-warning p-button p-component p-2"
                                    (click)="goto('/user/ucompany/product/edit', product1)">
                                    <span class="p-button-icon p-button-icon-left pi pi-cog text-xs" aria-hidden="true"></span>
                                    <span class="p-button-label text-base">edit</span>
                                    <span class="p-ink"></span>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <!-- <p-paginator [rows]="limit" [totalRecords]="productsCount" [rowsPerPageOptions]="[10,20,50]"
                (onPageChange)="paginate($event)"></p-paginator> -->
</div>
