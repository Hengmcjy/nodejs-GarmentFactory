        <div class="col-12 sm:col-6 md:col-4 lg:col-3 xl:col-2 p-0 pb-4 " *ngFor="let member of membersFactory; let i = index">
            <div class="shadow-2 p-2 mb-5 lg:mb-0 mr-0 lg:mr-5 surface-card">
                <img [src]="genImagePath(member.uInfo.pic)" class="mb-3 w-full">
                <div class="flex justify-content-between align-items-center">
                    <div class="pr-3">
                        <div class="text-xl text-900 font-medium mb-2">{{member.uInfo.userName}}</div>
                        <div class="text-sm text-blue-600 m-1">{{member.userID}}</div>
                        <div class="text-sm text-500">
                            <span class="font-semibold m-1">Class : </span>
                            <span class="m-1">{{member.uFactory[0].userFacClass.userClassName}}</span>
                        </div>
                    </div>
                </div>
                <div class="px-0 py-0 mt-2 text-right">
                    <button pbutton="" pripple="" icon="pi pi-arrow-right" iconpos="right"

                        <span class="p-ink"></span>
                    </button>
                </div>
            </div>
        </div>
