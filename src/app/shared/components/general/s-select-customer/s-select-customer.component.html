
<p-paginator [rows]="rows" [totalRecords]="totalCustomers"  [alwaysShow]="false"></p-paginator>
<div class="surface-ground px-4 py-4 md:px-4 lg:px-4 w-12">
    <div class="grid m-0 p-0">

        <div class="col-12 sm:col-6 md:col-4 lg:col-3  xl:col-2 p-0 pb-4 " *ngFor="let cus of customers; let i = index">
            <div class="shadow-2 p-2 mb-5 lg:mb-0 mr-0 lg:mr-5 bg-green-50" >
                <img [src]="genImagePath(cus.imageProfile)" class="mb-3 w-full">
                <div class="flex justify-content-between align-items-center">
                    <div class="pr-3">
                        <div class="text-xl text-900 font-medium mb-2">{{cus.customerName}}</div>
                        <div class="text-blue-600">{{cus.registDate | date :'mediumDate'}}</div>
                    </div>
                </div>
                <div class="px-0 py-0 mt-2 text-right">
                    <button pbutton="" pripple="" icon="pi pi-arrow-right" iconpos="right"
                        class="p-element p-ripple p-button-rounded p-button-text p-button-warning p-button p-component p-2"
                        (click)="selectCustomer(cus)">
                        <span class="p-button-icon p-button-icon-left pi pi-cog text-xs" aria-hidden="true"></span>
                        <span class="p-button-label text-base">{{this.data.btnCaption}}</span>
                        <span class="p-ink"></span>
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>
