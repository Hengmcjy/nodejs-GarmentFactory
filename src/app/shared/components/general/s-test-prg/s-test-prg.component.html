<p-tabView [scrollable]="true">
    <p-tabPanel header="test1" >
        <div>
            <button pButton
                pRipple label="getOrderProductionAPI1"
                class="p-button-success"
                (click)="getOrderProductionAPI1()"></button>
        </div>
        <div>
            <button pButton
                pRipple label="getOrderProductionAPI2"
                class="p-button-success"
                (click)="getOrderProductionAPI2()"></button>
        </div>
    </p-tabPanel>

    <p-tabPanel header="filename list " >

            test: get filename list from nodejs server
        </div>

        <div class="my-2">admin = {{userService.isAdmin()}}</div>

        <div class="mt-2">-------------------------------</div>
        <div class="mb-2">
            test download logging file text

        <div class="my-2">-------------------------------</div>

            get  filenames

            <span class="ml-2 text-green-300" *ngIf="fileListS.length > 0">

            </span>
            <div class="flex flex-row flex-wrap" >
                <div class="flex align-items-center justify-content-center bg-green-200  border-round m-2 px-4 cursor-pointer"

                    {{fl}}

        <div class="my-2">-------------------------------</div>

    </p-tabPanel>

    <p-tabPanel header="upload images" >
