
<div class="surface-ground px-4 py-5 md:px-6 lg:px-8">
    <div class="grid">
        <div class="col-12 md:col-6 lg:col-3" *ngFor="let mz of mainZoneList; let i = index">
            <div class="surface-card shadow-2 p-3 border-round cursor-pointer text-center" (click)="closeDialog(mz)">
                <span class="block text-500 font-medium mb-3"></span>
                <div class="text-900 font-medium text-2xl mb-2">{{mz.targetPlaceID}}</div>
            </div>
        </div>
    </div>
</div>
