


<div class="surface-ground px-4 py-5 md:px-6 lg:px-8">
    <div class="grid">
        <div class="col-12 md:col-6 lg:col-3" *ngFor="let ss of userService.orderSeasonYears; let i = index">
            <div class="surface-card shadow-2 p-3 border-round cursor-pointer text-center" (click)="closeDialog(ss.seasonYear)">
                <span class="block text-500 font-medium mb-3">season year</span>
                <div class="text-900 font-medium text-2xl mb-2">{{ss.seasonYear}}</div>

                <span class="text-600 font-medium ">Styles :  </span>
                &nbsp;&nbsp;
                <span class="text-500">{{ss.sumSeasonYearQty}}</span>
            </div>

        </div>
    </div>
</div>
