
<div class="" >
    <div class="w800-1000px">
        <div class="card m-0 p-0 border-none bg-tran">

            <!-- <button pButton pRipple type="button" icon="pi pi-refresh"
                class="p-button-rounded p-button-text p-button-lg mb-2 mx-1">
            </button> -->

            <!-- <button pButton pRipple type="button" class="p-button-rounded p-button-text mb-2 mx-1" >
                <span class="text-lg font-semibold">
                    {{reportHeader}}
                </span>
            </button> -->

            <button pButton pRipple type="button"
                class="p-button-rounded p-button-text p-button-warning mb-2 mx-1"
                styleClass="p-button-lg"
                (click)="showNodeIDSelectionModal()">
                <span class="text-lg font-semibold">
                    {{nodeIDSelected}}
                </span>
            </button>

            <button pButton pRipple type="button"
                class="p-button-rounded p-button-text text-indigo-200 mb-2 mx-1"
                styleClass="p-button-lg"
                (click)="getQCSettoCompletedListener()"
                *ngIf="nodeIDSelected===nodeSettoCompleted && visibleQCToCompletedBtn">
                <span class="text-lg font-semibold">
                    set QC to Completed
                </span>
            </button>
        </div>

        <p-tabView class="w800-1000px mb-0 pb-0"  styleClass="w800-1000px mb-0 pb-0" [scrollable]="true"
            (onChange)="onTabStyleChange($event)" [activeIndex]="selectedTabStyleIndex">
            <p-tabPanel class="mb-0 pb-0" styleClass="mb-0 pb-0" header="report"
                *ngIf="option.state==='scan-qctocomplete' && nodeIDSelected==='7.QC'">
                <span class="">report</span>
            </p-tabPanel>
            <p-tabPanel class="mb-0 pb-0" styleClass="mb-0 pb-0"  *ngFor="let orId of orderIDsNoScan; let i = index" header={{orId}}>

                <p-tabView [scrollable]="true" (onChange)="onTabZoneChange($event, orId)" [activeIndex]="selectedTabZoneIndex">
                    <p-tabPanel *ngFor="let zoneA of currentOrderIDZone(orId); let z1 = index" header={{zoneA}}>

                        <p-tabView [scrollable]="true" (onChange)="onTabColorChange($event, orId,  zoneA)" [activeIndex]="selectedTabColorIndex">
                            <p-tabPanel *ngFor="let colorA of currentOrderIDZoneColor(orId,  zoneA); let c1 = index"
                                header={{colorA}}>

                                <p-tabView [scrollable]="true" (onChange)="onTabSizeChange($event, orId,  zoneA, colorA)" [activeIndex]="selectedTabSizeIndex">
                                    <p-tabPanel *ngFor="let sizeA of currentOrderIDZoneColorSize(orId,  zoneA, colorA); let s1 = index"
                                        header={{userService.getSizeName(sizeA)}}>

                                        <p-table [value]="bundleNoGroup" styleClass="p-datatable-sm">
                                            <ng-template pTemplate="header">
                                                <tr>
                                                    <th class="text-center" style="width: 20%">BundleNo</th>
                                                    <th class="text-center">Product No.</th>
                                                </tr>
                                            </ng-template>
                                            <ng-template pTemplate="body" let-pD let-idx="rowIndex">
                                                <tr>
                                                    <td>
                                                        <span [ngClass]="pD.length<12?'txt-err':'txt-sm-gray'" class="">
                                                            {{ pD[0].bundleNo }}
                                                        </span>
                                                        <span [ngClass]="pD.length<12?'txt-err':'txt-sm-gray'" class="">
                                                             [ {{pD.length}} ]
                                                        </span>
                                                    </td>
                                                    <td class="flex flex-wrap">
                                                        <div class="flex" *ngFor="let proD of pD; let i = index">
                                                            <p-chip (dblclick)="addQRCode(orId,zoneA, colorA, sizeA, proD)">
                                                                <div class="text-sm p-1">
                                                                    <span [ngClass]="proD.toNode !== nodeIDSelected
                                                                        ?'font-light text-500 text-sm'
                                                                        :'font-semibold text-color'">
                                                                        {{proD.no}}
                                                                    </span>
                                                                    <div class="text-sm text-yellow-400 font-italic"
                                                                        *ngIf="proD.toNode !== nodeIDSelected">
                                                                        {{userService.strFirstAndDot(proD.toNode, 8)}}
                                                                    </div>
                                                                </div>
                                                            </p-chip>
                                                        </div>
                                                    </td>
                                                    <!-- <td>{{ product.category }}</td> -->
                                                    <!-- <td>{{ product.quantity }}</td> -->
                                                </tr>
                                            </ng-template>
                                        </p-table>
                                        <p-paginator [rows]="limit" [totalRecords]="BundlesCount" [rowsPerPageOptions]="[10,20,50]"
                                        (onPageChange)="paginate($event)"></p-paginator>
                                    </p-tabPanel>
                                    <!-- <p-tabPanel [disabled]="true" header={{headerTabZoneColorSize}}></p-tabPanel> -->
                                </p-tabView>

                            </p-tabPanel>
                            <!-- <p-tabPanel [disabled]="true" header={{headerTabZoneColor}}></p-tabPanel> -->
                        </p-tabView>

                    </p-tabPanel>
                    <!-- <p-tabPanel [disabled]="true" header={{headerTabZone}}></p-tabPanel> -->
                </p-tabView>

            </p-tabPanel>
        </p-tabView>
    </div>
</div>


<p-dialog header="QRCode list [QC set to completed]" [(visible)]="visibleQCToCompleted" [position]="position" [style]="{ width: '30vw' }">
    <app-smd-set-qc-complete></app-smd-set-qc-complete>
</p-dialog>
