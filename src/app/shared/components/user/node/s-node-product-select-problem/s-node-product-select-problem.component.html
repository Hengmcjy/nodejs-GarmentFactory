
<p-tabView [scrollable]="true">
    <p-tabPanel *ngFor="let nodex of nodeIDs; let i = index" header={{nodex}}>
        <div class="grid">

            <div class="col-12 lg:col-4 p-3 " *ngFor="let problem of findNodeProblem(nodex); let j = index">
                <div class="shadow-2 border-round surface-card mb-3 mx-2 h-full flex-column justify-content-between flex">
                    <div class="p-4">
                        <div class="flex align-items-center">
                            <span class="inline-flex border-circle align-items-center justify-content-center bg-yellow-100 mr-3"
                                style="width: 38px; height: 38px;">
                                <i class="pi pi-wrench text-xl text-yellow-600"></i>
                            </span>
                            <span class="text-900 font-medium text-2xl">{{problem.problemID}}</span>
                        </div>
                        <div class="text-900 my-3 text-xl font-medium">{{problem.problemName}}</div>
                        <p class="mt-0 mb-3 text-700 line-height-3">
                            {{problem.problemDetail}}
                        </p>
                    </div>
                    <div class="px-4 py-3 surface-100 text-right">
                        <button pbutton="" pripple="" icon="pi pi-arrow-right" iconpos="right" label="More"
                            class="p-element p-ripple p-button-rounded  p-button p-component bg-yellow-600"
                            (click)="selectProblem(nodex, problem)">
                            <span class="p-button-icon p-button-icon-right pi pi-arrow-right" aria-hidden="true"></span>
                            <span class="p-button-label">select</span>
                            <span class="p-ink" style="height: 106px; width: 106px; top: -35.9px; left: 5.9375px;"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </p-tabPanel>
</p-tabView>
