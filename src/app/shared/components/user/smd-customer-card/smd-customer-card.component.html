<div class="surface-card shadow-2 p-4
    flex flex-column align-items-center md:flex-row md:align-items-stretch h-full "
    style="border-radius: 10px;">
    <span class="text-center">
        <img [src]="genImagePath(customer.imageProfile)" class="w-10rem">
        <p class="mt-0 mb-3 line-height-3 text-center md:text-left  white-space-normal font-medium text-red-800">
            {{customer.customerID}}
        </p>
    </span>
    <div class="flex flex-column align-items-center md:align-items-stretch ml-4 mt-4 md:mt-0">
        <!-- <p class="mt-0 mb-3 line-height-3 text-center md:text-left  white-space-normal">
            {{customer.customerName}}
        </p> -->
        <p class="mt-0 mb-3 line-height-3 text-center md:text-left  white-space-normal">
            <span class="font-semibold text-800">regist date : </span>
            {{customer.registDate |  date: 'dd-MM-yyyy'}}
        </p>
        <p class="mt-0 mb-3 line-height-3 text-center md:text-left  white-space-normal">
            <span class="font-semibold text-800">detail : </span>
            {{customer.cusInfo.customerDetail}}
        </p>
        <span class="text-900 font-medium text-xl mb-1 mt-auto">
            {{customer.customerName}}
        </span>
        <!-- <div class="text-600 text-sm">Belton, Inc</div> -->
    </div>
</div>
