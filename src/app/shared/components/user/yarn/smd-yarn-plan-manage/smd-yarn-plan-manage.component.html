




<div class="surface-card p-4 shadow-2 border-round">
    <div class="font-medium text-3xl text-900 mb-0">
        <span *ngIf="mode==='create'">
            Yarn create plan
        </span>
        <span *ngIf="mode !== 'create'">
            Yarn plan
        </span>
    </div>
    <div class="text-300 text-xs ml-2 mb-3">{{uuid}}</div>
    <ul class="list-none p-0 m-0 border-top-1 surface-border">
        <li class="flex align-items-center py-3 px-2 flex-wrap surface-ground">
            <div class="text-500 w-full md:w-2 font-medium">
                Yarn ID
            </div>
            <div class="text-900 w-full md:w-10 flex">
                <button pButton pRipple type="button"
                    icon="pi pi-plus-circle"
                    class="p-button-rounded p-button-warning p-button-text"
                    *ngIf="mode==='create'"
                    (click)="showYarnList('yarn-lists-select')"></button>
                <span class="center1 ml-0" *ngIf="yarnSelect.yarnID !== ''">
                    <!-- {{yarnSelect.yarnID}} -->
                    {{yarnService.getYarnfullName(yarnSelect.yarnID)}}
                </span>
            </div>
        </li>
        <li class="flex align-items-center py-3 px-2 flex-wrap">
            <div class="text-500 w-full md:w-2 font-medium">
                Style
            </div>
            <div class="text-900 w-full md:w-10 line-height-3">
                <button pButton pRipple type="button"
                    icon="pi pi-plus-circle"
                    class="p-button-rounded p-button-warning p-button-text"
                    (click)="addNewStyle()"></button>
                <p-chip *ngFor="let oi of orderImagesSelect; let i1 = index"
                    class="mx-1 pl-3" styleClass="m-1 pl-0"
                    [ngClass]="mode==='create'?'cursor-pointer':''"
                    [label]="oi.orderID !== ''?oi.orderID:'select style...'"
                    [image]="oi.orderID !== ''?productImageProfileGCSPath+oi.imageProfile : nulltGCSPath "
                    [removable]="mode==='create' || mode==='edit'"
                    (onRemove)="styleRemove(i1)"
                    (dblclick)="showStyleSelector('orderID-selector', i1)">
                </p-chip>
            </div>
        </li>
        <li class="flex align-items-center py-3 px-2 flex-wrap surface-ground">
            <div class="text-500 w-full md:w-2 font-medium">Color</div>
            <div class="text-900 w-full md:w-10">
                <button pButton pRipple type="button" icon="pi pi-plus-circle"
                    class="p-button-rounded p-button-warning p-button-text"
                    (click)="addNewColor()"></button>
                    <p-chip  *ngFor="let color1 of colorSSelect; let i2 = index"
                        class="m-1 pl-3" styleClass="m-1 pl-0"
                        [label]="color1.color.colorName"
                        [removable]="mode==='create' || mode==='edit'"
                        (onRemove)="colorRemove(i2)"
                        (dblclick)="showColorSelector('color-selector', i2)">
                        <p-avatar class=" " label="" styleClass=" mr-2"
                            [style]="{ 'background-color': color1.color.colorValue, color: '#ffffff' }"
                            shape="circle"
                            ></p-avatar>
                    </p-chip>
            </div>
        </li>
        <li class=" flex flex-row-reverse flex-wrap py-3 px-2 ">
            <div class="flex align-items-center justify-content-center bg-tran font-bold border-round m-2">
                <button pButton pRipple type="button" label="Cancel" class="p-button-warning" (click)="btnAction('list')"></button>
            </div>
            <div class=" bg-tran font-bold border-round m-2">
                <button pButton pRipple type="button"
                    (click)="btnAction(mode)">
                    {{saveCaption}}
                </button>
                <div class="p-0 m-0 pb-1 mt-1" *ngIf="checkSaveStatus==='no'"><small class="txt-err" >data incorrect !!.</small></div>

            </div>
        </li>
    </ul>
</div>
