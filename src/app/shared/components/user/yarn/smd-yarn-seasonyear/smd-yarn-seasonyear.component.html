
<div class="surface-ground px-4 py-5 md:px-6 lg:px-8">
    <div class="grid">
        <div class="col-12 md:col-6 lg:col-3" *ngFor="let ys of yarnSeasons; let i = index">
            <div class="surface-card shadow-2 p-3 border-round cursor-pointer text-center" (click)="closeDialog(ys.yarnSeasonID)">
                <span class="block text-500 font-medium mb-3">{{moduleCaption}} season</span>
                <div class="text-900 font-medium text-2xl mb-2">{{ys.yarnSeasonID}}</div>
            </div>
        </div>
    </div>
</div>
